<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PrepEdge</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🚀 PrepEdge</h1>
            <h2>Create Account</h2>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Full name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password (min 6 characters)" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
                <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
            </form>
        </div>
    </div>
    
    <!-- IMPORTANT: Scripts in correct order -->
    <script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (password.length < 6) {
            alert('Password must be at least 6 characters');
            return;
        }
        
        const result = await AuthService.signup(name, email, password);
        if (result.success) {
            window.location.href = 'index.html';
        } else {
            alert('Signup failed: ' + (result.error || 'Please try again'));
        }
    }
    
    // Redirect if already logged in
    if (AuthService.isAuthenticated()) {
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
